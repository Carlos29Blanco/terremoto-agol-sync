name: Sync terremotovenezuela -> AGOL

on:
  schedule:
    # Cada 20 minutos. Nota: el cron de GitHub Actions no es exacto (puede retrasarse).
    - cron: "*/20 * * * *"
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write          # para commitear el caché de geocodificación

concurrency:
  group: agol-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          ARCGIS_API_KEY:    ${{ secrets.ARCGIS_API_KEY }}
          AGOL_LAYER_URL:    ${{ secrets.AGOL_LAYER_URL }}
          GEOCODE:           "true"
          GEOCODE_MIN_SCORE: "85"
        run: python sync.py

      - name: Persistir caché de geocodificación
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geocode_cache.json || true
          git commit -m "chore: update geocode cache [skip ci]" || echo "Sin cambios en el caché"
          git push || echo "Nada que empujar"
